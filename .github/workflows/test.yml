name: Java CI test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Add this step below
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # 'temurin' is the most common choice
          cache: 'maven'          # This handles the caching mentioned in your header

      - name: Run tests
        run: mvn clean test